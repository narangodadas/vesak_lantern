<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lantern 2 - Floral Fantasy</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .info { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; pointer-events: none; z-index: 10; }
        .back-btn { position: absolute; top: 20px; right: 20px; background: #ff8c00; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; z-index: 20; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <a class="back-btn" href="index.html">← Back</a>
    <div class="info">🌸 Floral Fantasy Lantern | 360° view</div>

    <a-scene embedded arjs="sourceType: webcam;">
        <a-marker preset="hiro">
            <a-entity position="0 0 0">
                <!-- Main lantern body: flower shape using cone + petals -->
                <a-cone radius-top="0.2" radius-bottom="0.7" height="0.9" color="#ff69b4" emissive="#ff1493" emissive-intensity="0.5" position="0 0 0">
                    <a-animation attribute="scale" from="1 1 1" to="1.05 1.05 1.05" dur="2000" repeat="indefinite" direction="alternate"></a-animation>
                </a-cone>
                
                <!-- Petals around (using toruses with scale) -->
                <a-torus radius="0.8" radius-tubular="0.08" color="#ffaa88" rotation="0 0 0" position="0 0.2 0"></a-torus>
                <a-torus radius="0.9" radius-tubular="0.06" color="#ff66cc" rotation="45 0 0" position="0 -0.1 0"></a-torus>
                <a-torus radius="0.85" radius-tubular="0.07" color="#ffdd99" rotation="-45 0 0" position="0 0.4 0"></a-torus>

                <!-- Top lotus bud -->
                <a-sphere radius="0.25" color="#ff88aa" position="0 0.65 0">
                    <a-animation attribute="material.opacity" from="0.7" to="1" dur="1000" repeat="indefinite" direction="alternate"></a-animation>
                </a-sphere>
                <!-- Decorative hanging strings -->
                <a-cylinder radius="0.03" height="0.4" color="#ffaa66" position="0.4 -0.4 0.4" rotation="30 0 30"></a-cylinder>
                <a-cylinder radius="0.03" height="0.4" color="#ffaa66" position="-0.4 -0.4 -0.4" rotation="-30 0 -30"></a-cylinder>
                <a-cylinder radius="0.03" height="0.4" color="#ffaa66" position="0.4 -0.4 -0.4" rotation="30 0 -30"></a-cylinder>
                <a-cylinder radius="0.03" height="0.4" color="#ffaa66" position="-0.4 -0.4 0.4" rotation="-30 0 30"></a-cylinder>

                <!-- Small floating flowers (spheres) -->
                <a-sphere radius="0.1" color="#ffdd99" position="0.6 0.1 0.2">
                    <a-animation attribute="position" from="0.6 0.1 0.2" to="0.6 0.4 0.2" dur="2000" repeat="indefinite" direction="alternate"></a-animation>
                </a-sphere>
                <a-sphere radius="0.1" color="#ff99cc" position="-0.5 0.3 -0.4">
                    <a-animation attribute="position" from="-0.5 0.3 -0.4" to="-0.5 0.6 -0.4" dur="2500" repeat="indefinite" direction="alternate"></a-animation>
                </a-sphere>
            </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
