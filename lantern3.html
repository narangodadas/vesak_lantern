<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lantern 3 - Geometric Glow</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .info { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 8px 15px; border-radius: 20px; pointer-events: none; z-index: 10; }
        .back-btn { position: absolute; top: 20px; right: 20px; background: #ff8c00; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; z-index: 20; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <a class="back-btn" href="index.html">← Back</a>
    <div class="info">🔺 Geometric Glow Lantern | 360° view</div>

    <a-scene embedded arjs="sourceType: webcam;">
        <a-marker preset="hiro">
            <a-entity position="0 0 0">
                <!-- Icosahedron core (geometric) -->
                <a-icosahedron radius="0.5" color="#33ccff" emissive="#00aaff" emissive-intensity="0.7">
                    <a-animation attribute="rotation.y" from="0" to="360" dur="10000" repeat="indefinite" easing="linear"></a-animation>
                    <a-animation attribute="material.emissive-intensity" from="0.5" to="1.2" dur="1500" repeat="indefinite" direction="alternate"></a-animation>
                </a-icosahedron>
                
                <!-- Outer geometric cage: octahedron wireframe -->
                <a-octahedron radius="0.8" color="#ffaa44" wireframe="true" opacity="0.6">
                    <a-animation attribute="rotation.x" from="0" to="360" dur="15000" repeat="indefinite" easing="linear"></a-animation>
                    <a-animation attribute="rotation.z" from="0" to="360" dur="15000" repeat="indefinite" easing="linear"></a-animation>
                </a-octahedron>

                <!-- Ring of small cubes orbiting -->
                <a-entity position="0 0 0">
                    <a-box width="0.12" height="0.12" depth="0.12" color="#ff3300" position="0.9 0 0">
                        <a-animation attribute="position" from="0.9 0 0" to="0 0 0.9" dur="2000" repeat="indefinite" direction="alternate"></a-animation>
                    </a-box>
                    <a-box width="0.12" height="0.12" depth="0.12" color="#33ff33" position="-0.9 0 0">
                        <a-animation attribute="position" from="-0.9 0 0" to="0 0 -0.9" dur="2000" repeat="indefinite" direction="alternate"></a-animation>
                    </a-box>
                    <a-box width="0.12" height="0.12" depth="0.12" color="#ff33ff" position="0 0.9 0">
                        <a-animation attribute="position" from="0 0.9 0" to="0 0.9 0.9" dur="2500" repeat="indefinite" direction="alternate"></a-animation>
                    </a-box>
                </a-entity>

                <!-- Sparkle particles -->
                <a-entity position="0 0.5 0">
                    <a-sphere radius="0.07" color="#ffff00" position="0.6 0.2 0.4">
                        <a-animation attribute="scale" from="0.5 0.5 0.5" to="1.2 1.2 1.2" dur="800" repeat="indefinite" direction="alternate"></a-animation>
                    </a-sphere>
                    <a-sphere radius="0.07" color="#00ffff" position="-0.5 0.6 -0.3">
                        <a-animation attribute="scale" from="0.5 0.5 0.5" to="1.2 1.2 1.2" dur="1000" repeat="indefinite" direction="alternate"></a-animation>
                    </a-sphere>
                </a-entity>
            </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
